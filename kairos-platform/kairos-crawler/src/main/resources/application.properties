# --- RabbitMQ Configuration ---
# Your RabbitMQ server details. For local development with Docker, this is standard.
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# --- KAIROS Crawler Configuration ---
kairos.crawler.user-agent=KAIROS-Community-Crawler1
kairos.crawler.crawl-delay-ms=2000
# Be polite: wait 2 seconds between requests to the same domain

# --- YouTube API Configuration ---
kairos.youtube.api-key=YOUR_GOOGLE_CLOUD_API_KEY_WITH_YOUTUBE_ENABLED
kairos.youtube.application-name=KAIROS-Platform