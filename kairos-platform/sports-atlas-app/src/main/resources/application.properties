# Server Configuration (run on a different port to avoid conflict with the cultural archive)
server.port=8081

spring.profiles.active=dev

# Spring Application Configuration
spring.application.name=sports-atlas-app

# Spring Datasource Configuration (using a separate database)
spring.datasource.url=jdbc:postgresql://localhost:5432/sports
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Spring JPA & Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
