server.port=8080

# Spring Application Configuration
spring.application.name=cultural-archive-app

# Spring Datasource Configuration (PostgreSQL for relational data)
spring.datasource.url=jdbc:postgresql://localhost:5432/kai
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Spring JPA & Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# -----------------------------------------------
# KAIROS Platform Configuration
# -----------------------------------------------

# AI Provider (Google Vertex AI)
kairos.ai.vertex.project-id=
kairos.ai.vertex.location=
# You can override other AI properties here if needed, e.g.:
kairos.ai.vertex.chat-model-name=gemini-2.0-flash
# kairos.ai.vertex.temperature=0.5


kairos.vector-store.pgvector.host=localhost
kairos.vector-store.pgvector.port=5432
kairos.vector-store.pgvector.table-name=embeddings
kairos.vector-store.pgvector.username=
kairos.vector-store.pgvector.password=
kairos.vector-store.pgvector.database=kai
kairos.vector-store.pgvector.timeout-seconds=60

kairos.security.jwt.secret=
# Expiration time in milliseconds (e.g., 24 hours)
kairos.security.jwt.expiration-ms=864000000000

app.cors.allowed-origins=http://localhost:3000

spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

kairos.storage.gcs.bucket-name=
kairos.storage.gcs.project-id=

kairos.ai.vertex.transcription-provider=
